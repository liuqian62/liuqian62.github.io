calibration:
  title: "多传感器标定 Calibration"
  intro: "围绕相机、LiDAR、IMU、Radar 以及跨传感器系统的空间标定与时空联合标定，聚焦可复现工具、经典方法与工程排障。"
  sections:
    - title: "标定基础"
      description: "先建立共同语言，再进入不同传感器的具体方案。"
      subtopics:
        - key: "camera"
          title: "相机 Camera"
          description: "单目、鱼眼、ChArUco / ArUco 与 OpenCV 标定流程。"
        - key: "stereo-multi-camera"
          title: "双目 / 多目 Stereo & Multi-camera"
          description: "极线校正、rig 标定和多相机一致性。"
        - key: "lidar"
          title: "LiDAR"
          description: "点云几何、去畸变、安装约束与点云配准基础。"
        - key: "imu"
          title: "IMU"
          description: "噪声模型、Allan variance 和惯导参数估计。"
        - key: "radar"
          title: "Radar"
          description: "毫米波 / 成像雷达基础与多模态对齐难点。"
    - title: "跨传感器"
      description: "三维重建和机器人系统里最常见的传感器组合。"
      subtopics:
        - key: "lidar-camera"
          title: "LiDAR - Camera"
          description: "目标法、无目标法、自动 refinement 与 overlay 验证。"
        - key: "camera-imu"
          title: "Camera - IMU"
          description: "VIO 标定、时延与外参联合估计。"
        - key: "lidar-imu"
          title: "LiDAR - IMU"
          description: "LIO 初始化、deskew 与联合优化。"
        - key: "radar-camera"
          title: "Radar - Camera"
          description: "角反射器、检测级对齐与自动化挑战。"
        - key: "radar-lidar"
          title: "Radar - LiDAR"
          description: "户外场景下的点迹与点云空间对齐。"
        - key: "radar-imu"
          title: "Radar - IMU"
          description: "运动激励与实验性融合方案。"
        - key: "spatiotemporal-calibration"
          title: "Spatiotemporal Calibration"
          description: "将时间偏移与外参放进同一优化框架。"
        - key: "calibration-tools"
          title: "工具与排障"
          description: "Kalibr、LI-Init、TIER IV CalibrationTools 等工具入口。"

sync:
  title: "时间同步 Sync"
  intro: "把 offset、drift、latency 和 timestamping 讲清楚，帮助多传感器重建系统在硬件和软件层真正对齐。"
  sections:
    - title: "同步基础"
      description: "硬同步和软同步的边界、收益和常见误区。"
      subtopics:
        - key: "sync-fundamentals"
          title: "Offset / Drift / Latency"
          description: "先理解误差来源，再决定该用哪种同步方案。"
    - title: "硬件同步"
      description: "适合追求高可靠性和低抖动的采集系统。"
      subtopics:
        - key: "trigger-sync"
          title: "Trigger / Shared Clock"
          description: "外部触发、主从时钟和布线注意事项。"
        - key: "ptp-pps"
          title: "PTP / PPS"
          description: "IEEE 1588、硬件时间戳和 PPS 信号。"
    - title: "软件同步"
      description: "当设备不支持硬同步时，用驱动、消息和后处理减少时间偏移。"
      subtopics:
        - key: "software-timestamping"
          title: "驱动时间戳与后处理对齐"
          description: "软件时间戳、lag 对齐和 offset 估计。"
        - key: "ros-message-sync"
          title: "ROS / ROS2 Message Filters"
          description: "Exact / Approximate 同步、QoS 和队列设置。"
        - key: "continuous-time"
          title: "连续时间建模"
          description: "用 spline / continuous-time 轨迹处理异步传感器。"
        - key: "sync-diagnostics"
          title: "评测与排障"
          description: "通过 overlay、lag scan 和 residual 识别同步问题。"

reconstruction:
  title: "重建 Reconstruction"
  intro: "从传统几何重建到神经场，再到面向机器人建图的在线系统，按输入条件、输出形态和应用目标组织学习路径。"
  sections:
    - title: "传统多视图重建"
      description: "经典但仍然非常重要，是后续 NeRF 和 3DGS 数据准备的基础。"
      subtopics:
        - key: "sfm-mvs"
          title: "SfM / MVS"
          description: "稀疏重建、稠密重建、表面化和贴图。"
        - key: "reconstruction-tools"
          title: "工具链"
          description: "COLMAP、OpenMVG、OpenMVS、Open3D 和 Mesh toolchain。"
    - title: "体素与 TSDF / SDF"
      description: "面向 RGB-D 和增量建图的几何表示。"
      subtopics:
        - key: "tsdf-sdf"
          title: "TSDF / SDF"
          description: "KinectFusion、体素哈希和大场景体积建图。"
    - title: "SLAM 建图"
      description: "既关注定位，也关注可交付的地图表示。"
      subtopics:
        - key: "slam-mapping"
          title: "视觉 / RGB-D / 神经 SLAM"
          description: "从 ORB-SLAM3 到 NICE-SLAM 的建图谱系。"
    - title: "NeRF 与神经场"
      description: "理解体渲染、效率优化和大场景扩展。"
      subtopics:
        - key: "nerf"
          title: "NeRF / Neural Fields"
          description: "基础 NeRF、高效 NeRF、无界与动态场景。"
    - title: "专题与基础设施"
      description: "建立对数据集、benchmark 和 survey 的系统认识。"
      subtopics:
        - key: "datasets-benchmarks"
          title: "数据集与 Benchmark"
          description: "从实验设置到评价指标的对照索引。"

3dgs:
  title: "3D Gaussian Splatting Frontier"
  intro: "这是更新最快的栏目，专门追踪 3DGS 基础工作、几何改进、动态场景、压缩、编辑、大场景和机器人建图。"
  sections:
    - title: "基础与表示"
      description: "先把 3DGS 核心训练流程、渲染和实现生态吃透。"
      subtopics:
        - key: "3dgs-foundations"
          title: "基础与改进版 3DGS"
          description: "原始 3DGS、Splatfacto 与基础工具链。"
        - key: "3dgs-geometry"
          title: "几何准确 / 表面化"
          description: "2DGS、mesh extraction 和几何增强。"
    - title: "动态与大场景"
      description: "3DGS 已经从静态新视角合成扩展到更复杂的现实场景。"
      subtopics:
        - key: "dynamic-3dgs"
          title: "动态 / 4D / 可变形"
          description: "时变场景、人体和交通场景。"
        - key: "online-3dgs"
          title: "实时 / 在线 / 增量优化"
          description: "增量式或在线式 3DGS 管线。"
        - key: "large-scale-3dgs"
          title: "大场景 / 分层 / 户外 / 车载"
          description: "面向长序列、城市级与车载场景。"
    - title: "部署与应用"
      description: "把研究原型推进到压缩、编辑、SLAM 和标准化。"
      subtopics:
        - key: "compressed-3dgs"
          title: "压缩 / 轻量化 / 传输"
          description: "模型尺寸、传输效率和部署成本。"
        - key: "editable-3dgs"
          title: "编辑 / 语义 / 分割 / 可控"
          description: "从语义理解到交互式编辑。"
        - key: "3dgs-slam"
          title: "3DGS-SLAM / 机器人建图"
          description: "将高保真表示引入在线定位与建图。"
        - key: "3dgs-standards"
          title: "标准化与生态"
          description: "glTF Gaussian Splatting、Web 和引擎支持。"
